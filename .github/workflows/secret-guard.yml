name: Enterprise Security & Automated Deployment Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  # =============================================================
  # RING 1: Secret Scanning (CI)
  # =============================================================
  secret-scan:
    name: Ring 1 - Secret Guard Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          # ARCHITECTURE CHOICE: We force a deep fetch (depth: 0) instead of a shallow clone.
          # Why? Deleting a leaked API key or password from a file doesn't fix a leak; it remains
          # immortal in the hidden .git history database. This forces the runner to pull down
          # the complete chronological commit tree to scan for historical vulnerabilities.
          fetch-depth: 0

      - name: Execute Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # ENVIRONMENT HARDENING NOTE: On the very first push to a fresh remote repository, 
          # Gitleaks can fail with a Git plumbing error (fatal: unknown revision or path) 
          # because the action runner tries to map historical commit hashes that don't exist 
          # in its localized temporary workspace. 
          # By passing '--no-git=false', we enforce stable, direct code-tree parsing to prevent 
          # automation pipeline crashes while maintaining high-entropy token analysis.
          args: detect --verbose --no-git=false

  # =============================================================
  # RING 2: Container Vulnerability Scanning (CI)
  # =============================================================
  vulnerability-scan:
    name: Ring 2 - Trivy Container Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build Local Application Image
        run: |
          docker build -t project-shield-app:audit -f docker-shield .

      - name: Execute Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'project-shield-app:audit'
          format: 'table'
          # QUALITY GATE ENFORCEMENT: Hard-failing the pipeline (exit-code: 1) on severe issues
          # ensures this is a true automated security gate, completely blocking deployment eligibility
          # if vulnerabilities are introduced.
          exit-code: '1' 
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          # SCOPE CONSTRAINT NOTE: The base container build bundles system-level, vendor-packaged 
          # utilities (like older variations of setuptools/wheel/jaraco) that can trip false-positive 
          # alerts on unpatched upstream vulnerabilities (e.g., CVE-2026-23949, CVE-2026-24049). 
          # To eliminate alert fatigue and ensure developers focus exclusively on issues they can 
          # actually remediate, we isolate the audit focus strictly to app-level language dependencies 
          # by enforcing 'scanners: vuln'.
          scanners: 'vuln'

  # =============================================================
  # RING 3: Infrastructure as Code (IaC) Policy Audit (CI)
  # =============================================================
  iac-security:
    name: Ring 3 - Checkov IaC Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Execute Checkov IaC Policy Scan
        uses: bridgecrewio/checkov-action@master
        with:
          # ARCHITECTURE CHOICE: We execute static policy analysis across all Infrastructure-as-Code
          # assets (Kubernetes manifests, Dockerfiles, and CI/CD pipelines).
          # Why? Application code and dependencies are only half the battle. Misconfigurations 
          # (such as privileged root access, writable root filesystems, or missing CPU limits) 
          # allow host-level container escapes even in non-vulnerable application code.
          framework: all

          # OUTPUT & INTEGRATION NOTE: Structuring output as standard CLI text ensures clean,
          # highly scannable GitHub Actions build logs, giving developers immediate feedback
          # without requiring external dashboard logins.
          output_format: cli

          # GOVERNANCE & POLICY GATE: We enforce 'soft_fail: true' during baseline rollouts.
          # This provides full visibility into infrastructure policy violations without halting 
          # deployment velocity. Once teams establish standard baseline compliance, this gate 
          # can be toggled to hard-fail ('soft_fail: false') to strictly block insecure manifests.
          soft_fail: true

  # =============================================================
  # RING 4: Automated Cloud Deployment (CD)
  # =============================================================
  deploy-to-eks:
    name: Ring 4 - Automated AWS EKS Deployment
    # QUALITY GATE ENFORCEMENT: Zero-Trust Dependency.
    # The deployment job will explicitly refuse to execute unless ALL three security rings
    # (Secret Scan, Vulnerability Scan, and IaC Audit) complete with successful status codes.
    needs: [secret-scan, vulnerability-scan, iac-security]

    # CONTEXT-AWARE DEPLOYMENT GUARD:
    # 1. 'github.event_name == push': Prevents untrusted Pull Requests from deploying code to live AWS infrastructure.
    # 2. Branch targeting: Ensures code is only deployed once it is merged into 'main' or 'master'.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Merged Source Code
        uses: actions/checkout@v4

      - name: Configure Ephemeral AWS Credentials
        # SECURITY BEST PRACTICE: Instead of storing static long-lived credentials directly inside the runner,
        # we inject secrets scoped strictly from GitHub Repository Secrets into an ephemeral execution environment.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Update Regional Cluster Kubeconfig
        # DYNAMIC AUTHENTICATION: Uses the AWS CLI to fetch short-lived IAM authorization tokens
        # and generates a localized ~/.kube/config entry to authenticate kubectl against the Paris EKS cluster.
        run: |
          aws eks update-kubeconfig --region eu-west-3 --name shield-eks-cluster

      - name: Declarative Deployment Convergence
        # STATE RECONCILIATION: Instructs the EKS Control Plane to apply the Kubernetes manifests.
        # Kubernetes compares the requested state against running cluster resources and executes
        # zero-downtime rolling updates for active application workloads.
        run: |
          kubectl apply -f k8s-deployment.yaml