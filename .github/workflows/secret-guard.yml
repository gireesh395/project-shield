name: Enterprise Security Automation Pipeline

# TRIGGER LOGIC: I configured this pipeline to run on both pushes and pull requests to master/main.
# This ensures that no matter how code gets moved—whether a direct push or a collaborative peer review—
# the security gates are always triggered and cannot be bypassed.
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  secret-scan:
    name: Ring 1 - Secret Guard Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          # EXPLANATION ON FORMAT: I explicitly set fetch-depth to 0 because a default git checkout 
          # only grabs the most recent commit snapshot. By forcing a full historical clone, 
          # the scanner checks our entire git history database. This stops a developer from 
          # hiding a secret in an old commit and trying to sneak it past us.
          fetch-depth: 0

      - name: Execute Gitleaks Scan
        # WHY THIS TOOL: I chose Gitleaks here to act as our Static Application Security Testing (SAST) layer.
        # It handles high-entropy string math and regex patterns perfectly to sniff out leaked API keys, 
        # tokens, or hardcoded credentials before they get exposed.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  vulnerability-scan:
    name: Ring 2 - Trivy Container Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build Local Application Image
        # ARCHITECTURE STEP: Instead of scanning raw files, I am building the actual application image 
        # locally on the cloud runner using our custom docker-shield configuration. This lets us 
        # inspect the exact environment layers that would run in production.
        run: |
          docker build -t project-shield-app:audit -f docker-shield .

      - name: Execute Trivy Vulnerability Scan
        # WHY THIS TOOL: I pulled in Trivy as our Software Component Analysis (SCA) gatekeeper.
        # While Gitleaks hunts for keys in our code, Trivy checks the base Linux OS layers and 
        # python packages against global vulnerability databases to look for known CVE security flaws.
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'project-shield-app:audit'
          format: 'table'
          # CRITICAL SECURITY GATE: I mapped exit-code to '1'. This ensures that if any high or critical 
          # vulnerabilities are discovered inside the built container, the entire pipeline immediately 
          # terminates and breaks the build, physically preventing dangerous code from deploying.
          exit-code: '1' 
          # EFFICIENCY CHOICE: I set ignore-unfixed to true so the pipeline ignores vulnerabilities 
          # that don't have an available patch yet, keeping the team focused on issues they can actually fix.
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'